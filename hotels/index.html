<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Package | JANA Travel</title>
  <link rel="icon" href="../public/JanaTravelLogo.webp" type="image/webp">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --aqua-blue:#00CED1; --aqua-dark:#008B8B; --aqua-light:#7FEFEF; --text:#1A3A3A; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Poppins',sans-serif; color:var(--text); background:linear-gradient(180deg,#f6ffff 0%,#eff9f8 100%); line-height:1.7; }
    .topbar { position:sticky; top:0; z-index:10; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:0.8rem 5%; background:rgba(255,255,255,.92); backdrop-filter:blur(8px); border-bottom:1px solid rgba(0,206,209,.2); }
    .back-link { text-decoration:none; color:var(--aqua-dark); font-weight:600; border:1px solid rgba(0,139,139,.25); border-radius:999px; padding:0.45rem 0.9rem; background:rgba(0,206,209,.08); justify-self:start; }
    .brand { display:inline-flex; gap:0.6rem; align-items:center; text-decoration:none; color:var(--aqua-dark); font-weight:700; justify-self:center; }
    .brand img {
      width:42px;
      height:42px;
      object-fit:contain;
      filter: drop-shadow(0 0 3px rgba(0, 0, 0, 0.25)) drop-shadow(0 0 6px rgba(0, 0, 0, 0.2)) drop-shadow(0 0 10px rgba(0, 0, 0, 0.15));
    }
    .topbar-spacer { width:64px; justify-self:end; }
    .wrap { max-width:1100px; margin:0 auto; padding:2rem 1.2rem 3rem; }
    h1 { color:var(--aqua-dark); font-size:clamp(1.8rem,3vw,2.4rem); margin-bottom:.6rem; }
    .lead { margin:1rem 0 1.2rem; white-space:normal; overflow-wrap:anywhere; word-break:break-word; }
    .meta { display:flex; flex-wrap:wrap; gap:.7rem; margin-bottom:1.3rem; }
    .pill { border:1px solid rgba(0,139,139,.25); border-radius:999px; padding:.35rem .8rem; background:#fff; font-weight:500; font-size:.92rem; }
    .pill-link { color:inherit; text-decoration:none; }
    .pill-link:hover {
      border-color:rgba(0,206,209,.65);
      background:rgba(0,206,209,.1);
      color:var(--aqua-dark);
      box-shadow:0 6px 14px rgba(0,206,209,.25);
      transform:translateY(-1px);
    }
    .hero { border-radius:16px; overflow:hidden; box-shadow:0 14px 34px rgba(0,139,139,.2); margin-bottom:1.4rem; }
    .hero img { width:100%; height:min(52vw,480px); object-fit:cover; display:block; }
    .media-gallery { margin:1.2rem 0 1.4rem; }
    .hero--interactive { position:relative; margin-bottom:.8rem; cursor:zoom-in; }
    .hero-nav {
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:50px;
      height:50px;
      border:none;
      border-radius:999px;
      background:rgba(0,0,0,.5);
      color:#fff;
      font-size:1.2rem;
      line-height:1;
      cursor:pointer;
      z-index:10;
      transition:all .3s ease;
    }
    @media (hover:hover) {
      .hero-nav,
      .hero-counter,
      .maximize-btn {
        opacity:0;
        transition:opacity .2s ease;
      }
      .hero--interactive:hover .hero-nav,
      .hero--interactive:hover .hero-counter,
      .hero--interactive:hover .maximize-btn,
      .hero--interactive:focus-within .hero-nav,
      .hero--interactive:focus-within .hero-counter,
      .hero--interactive:focus-within .maximize-btn {
        opacity:1;
      }
    }
    .hero-nav--prev { left:15px; }
    .hero-nav--next { right:15px; }
    .hero-nav:hover {
      background:var(--aqua-dark);
      transform:translateY(-50%);
    }
    .hero-counter {
      position:absolute;
      bottom:15px;
      left:50%;
      transform:translateX(-50%);
      color:white;
      font-size:1rem;
      background:rgba(0,0,0,.5);
      padding:8px 20px;
      border-radius:20px;
      z-index:10;
    }
    .maximize-btn {
      position:absolute;
      right:15px;
      bottom:15px;
      border:none;
      border-radius:999px;
      background:rgba(0,0,0,.5);
      color:white;
      font-weight:600;
      font-size:.88rem;
      padding:.4rem .85rem;
      transition:all .3s ease;
      z-index:10;
    }
    .maximize-btn:hover {
      background:var(--aqua-dark);
      transform:none;
    }
    .thumb-strip {
      display:flex;
      gap:.7rem;
      overflow-x:auto;
      padding:.15rem .1rem .55rem;
      scroll-snap-type:x proximity;
    }
    .thumb-btn {
      flex:0 0 86px;
      border:2px solid transparent;
      border-radius:12px;
      padding:0;
      background:#fff;
      cursor:pointer;
      box-shadow:0 7px 16px rgba(0,139,139,.12);
      scroll-snap-align:start;
      transition:border-color .2s ease, transform .2s ease;
    }
    .thumb-btn img {
      width:100%;
      height:60px;
      object-fit:cover;
      border-radius:10px;
      display:block;
    }
    .thumb-btn:hover { transform:translateY(-2px); }
    .thumb-btn.is-active { border-color:var(--aqua-blue); }
    .image-lightbox {
      position:fixed;
      inset:0;
      z-index:9999;
      background:rgba(0,0,0,.86);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1rem;
    }
    .image-lightbox[hidden] { display:none !important; }
    .image-lightbox img {
      width:min(95vw,1100px);
      max-height:88vh;
      object-fit:contain;
      border-radius:12px;
    }
    .lightbox-counter {
      position:absolute;
      left:50%;
      bottom:30px;
      transform:translateX(-50%);
      border:none;
      border-radius:999px;
      background:rgba(0,0,0,.5);
      color:white;
      font-size:1rem;
      font-weight:600;
      padding:8px 20px;
    }
    .lightbox-close,
    .lightbox-nav {
      position:absolute;
      cursor:pointer;
      transition:all .3s ease;
    }
    .lightbox-close {
      top:20px;
      right:30px;
      background:none;
      color:white;
      border:none;
      font-size:3rem;
      line-height:1;
      z-index:10;
    }
    .lightbox-nav {
      top:50%;
      transform:translateY(-50%);
      width:60px;
      height:60px;
      border-radius:50%;
      border:none;
      background:rgba(255,255,255,.1);
      color:white;
      font-size:1.5rem;
      line-height:1;
    }
    .lightbox-nav--prev { left:30px; }
    .lightbox-nav--next { right:30px; }
    .lightbox-close:hover {
      color:var(--aqua-light);
      transform:rotate(90deg);
    }
    .lightbox-nav:hover {
      background:var(--aqua-blue);
      transform:translateY(-50%);
    }
    body.lightbox-open { overflow:hidden; }
    h2 { color:var(--aqua-dark); margin:1rem 0 .55rem; font-size:1.25rem; }
    .details-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:.75rem;
      margin-top:.75rem;
      align-items:start;
      grid-auto-rows:min-content;
    }
    .detail-card {
      background:#fff;
      border-radius:12px;
      padding:.7rem .8rem;
      box-shadow:0 8px 16px rgba(0,139,139,.1);
      height:auto;
      align-self:start;
    }
    .detail-card .label { display:block; color:#4f6c6c; font-size:.82rem; margin-bottom:.15rem; }
    .detail-card .value { color:#123434; font-weight:600; }
    .detail-card .value-link { color:var(--aqua-dark); text-decoration:underline; text-underline-offset:2px; }
    .info-sections {
      margin:1.2rem auto 0;
      max-width:900px;
    }
    .info-sections h2 { text-align:center; }
    .info-tabs {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:.55rem;
      margin:.7rem 0 .85rem;
      padding:.6rem;
      border-radius:14px;
      background:linear-gradient(135deg, rgba(0,206,209,.14), rgba(0,139,139,.09));
      border:1px solid rgba(0,139,139,.12);
    }
    .info-tab {
      border:1px solid rgba(0,139,139,.22);
      border-radius:999px;
      background:#fff;
      color:#175050;
      font-weight:600;
      padding:.45rem .95rem;
      cursor:pointer;
      transition:all .2s ease;
    }
    .info-tab:hover {
      border-color:rgba(0,206,209,.6);
      box-shadow:0 6px 14px rgba(0,206,209,.2);
      transform:translateY(-1px);
    }
    .info-tab.is-active {
      background:var(--aqua-dark);
      color:#fff;
      border-color:var(--aqua-dark);
      box-shadow:0 8px 18px rgba(0,139,139,.25);
    }
    .info-panel {
      background:#fff;
      border:1px solid rgba(0,139,139,.12);
      border-radius:14px;
      padding:.9rem 1rem;
      box-shadow:0 8px 16px rgba(0,139,139,.08);
      text-align:center;
    }
    .info-panel h3 {
      font-size:1.02rem;
      color:var(--aqua-dark);
      margin-bottom:.2rem;
    }
    #hotelInfoPanelBody { text-align:left; }
    .info-empty {
      margin:0;
      color:#4a6868;
      font-size:.95rem;
    }
    .section-item {
      padding:.65rem 0;
      border-bottom:1px dashed rgba(0,139,139,.2);
    }
    .section-item:last-child { border-bottom:none; padding-bottom:0; }
    .section-item__title {
      margin:0;
      color:#144747;
      font-size:.98rem;
      font-weight:700;
      line-height:1.5;
      white-space:normal;
      overflow-wrap:anywhere;
      word-break:break-word;
    }
    .section-item__thumbs {
      margin-top:.55rem;
      display:flex;
      flex-wrap:wrap;
      gap:.5rem;
    }
    .section-thumb-btn {
      border:1px solid rgba(0,139,139,.2);
      border-radius:10px;
      padding:0;
      background:#fff;
      cursor:pointer;
      width:170px;
      height:116px;
      overflow:hidden;
      box-shadow:0 6px 12px rgba(0,139,139,.1);
    }
    .section-thumb-btn img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .cta { margin-top:1.5rem; text-align:center; }
    .cta a { display:inline-block; text-decoration:none; background:var(--aqua-dark); color:#fff; padding:.95rem 1.8rem; border-radius:999px; font-weight:700; font-size:1.03rem; }
    .page-state { margin:0 auto 1rem; max-width:720px; padding:.8rem 1rem; border-radius:12px; font-size:.95rem; text-align:center; }
    .page-state.loading { background:rgba(0,206,209,.12); color:var(--aqua-dark); border:1px solid rgba(0,206,209,.3); }
    .page-state.success { display:none; }
    .page-state.empty { background:#fff9e8; color:#8a6a11; border:1px solid #f4df9e; }
    .page-state.error { background:#ffeef0; color:#9b1d2b; border:1px solid #f3bcc5; }
    @media (max-width:780px){
      .thumb-btn { flex-basis:92px; }
      .thumb-btn img { height:68px; }
      .hero-nav { width:34px; height:34px; font-size:1.05rem; }
      .hero-counter { font-size:.75rem; padding:.22rem .56rem; }
      .maximize-btn { font-size:.85rem; padding:.35rem .7rem; }
      .lightbox-nav { width:40px; height:40px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="back-link" href="../" onclick="if (window.history.length > 1) { window.history.back(); return false; }">Back</a>
    <div class="brand" aria-label="JANA Travel">
      <img src="../public/JanaTravelLogo.webp" alt="JANA Travel logo">
      <span>JANA <span style="color:var(--aqua-light)">Travel</span></span>
    </div>
    <div class="topbar-spacer" aria-hidden="true"></div>
  </header>

  <main class="wrap">
    <h1 id="hotelTitle">Hotel Package</h1>
    <div id="hotelPageState" class="page-state loading">Loading hotel package...</div>
    <section id="hotelContent"></section>
  </main>

  <script>
    window.JANA_HOTELS_SHEET_URL = "https://opensheet.elk.sh/1v3F_YYEJl1mhoN9Hs2F6ee8SzXjsbJdGvXqczB9LKL4/Form%20Responses%201";
  </script>
  <script type="module" src="../js/hotels-route.js"></script>
</body>
</html>
